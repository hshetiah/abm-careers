<title>BIGGBY COFFEE Careers | American Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --biggby-orange: #FA641E;
    --biggby-orange-hover: #E8560F;
    --biggby-orange-glow: rgba(250, 100, 30, 0.10);
    --biggby-black: #1A1A1A;
    --white: #FFFFFF;
    --off-white: #F8F7F5;
    --light-gray: #EDECEA;
    --mid-gray: #9E9A95;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6660;
    --card-shadow: 0 1px 8px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .header { background: var(--white); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,0.08); border-bottom: 3px solid var(--biggby-orange); }
  .header-inner { max-width: 1100px; margin: 0 auto; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
  .header-brand { display: flex; align-items: center; gap: 20px; }
  .header-logo-biggby { height: 44px; width: auto; }
  .header-divider { width: 1px; height: 32px; background: rgba(0,0,0,0.12); }
  .header-logo-abm { height: 40px; width: auto; }
  .header-tag { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 12px; color: var(--biggby-orange); letter-spacing: 2px; text-transform: uppercase; }

  .portal { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
  .hero-text { text-align: center; margin-bottom: 40px; }
  .hero-text h1 { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 40px; color: var(--biggby-black); line-height: 1.15; margin-bottom: 10px; }
  .hero-text h1 span { color: var(--biggby-orange); }
  .hero-text p { font-size: 16px; color: var(--text-secondary); line-height: 1.5; }

  .flow-container { background: var(--white); border-radius: var(--radius); box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.04); overflow: hidden; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; padding: 16px 24px; background: var(--light-gray); font-size: 13px; font-weight: 500; color: var(--text-secondary); border-bottom: 1px solid rgba(0,0,0,0.04); flex-wrap: wrap; }
  .breadcrumb-item { cursor: pointer; color: var(--biggby-orange); transition: opacity 0.2s; }
  .breadcrumb-item:hover { opacity: 0.7; }
  .breadcrumb-sep { color: var(--mid-gray); font-size: 11px; }
  .breadcrumb-current { color: var(--text-primary); font-weight: 600; }

  .step-content { padding: 32px 24px; }
  .step-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 20px; color: var(--text-primary); margin-bottom: 20px; text-align: center; }

  .options-grid { display: grid; gap: 10px; }
  .options-grid.two-col { grid-template-columns: 1fr 1fr; }
  .options-grid.multi-col { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }

  .option-btn { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 16px; padding: 18px 24px; border-radius: var(--radius-sm); border: 1.5px solid var(--light-gray); background: var(--white); color: var(--text-primary); cursor: pointer; transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1); text-align: left; display: flex; align-items: center; justify-content: space-between; }
  .option-btn:hover { border-color: var(--biggby-orange); background: var(--biggby-orange-glow); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(250,100,30,0.1); }
  .option-btn .count { font-size: 12px; font-weight: 700; color: var(--biggby-orange); background: var(--biggby-orange-glow); padding: 3px 10px; border-radius: 20px; }
  .option-btn .arrow { color: var(--mid-gray); transition: color 0.2s, transform 0.2s; font-size: 16px; }
  .option-btn:hover .arrow { color: var(--biggby-orange); transform: translateX(2px); }

  
  .option-btn.state-btn { font-size: 22px; font-weight: 700; padding: 36px 40px; border-radius: var(--radius); }

  .job-list { display: flex; flex-direction: column; }
  .job-item { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--light-gray); gap: 16px; flex-wrap: wrap; }
  .job-item:last-child { border-bottom: none; }
  .job-info { flex: 1; min-width: 200px; }
  .job-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .job-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 17px; color: var(--text-primary); }
  .job-badge { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: 4px; }
  .badge-barista { background: #FFF3ED; color: #C84A0E; }
  .badge-leader { background: var(--biggby-black); color: var(--biggby-orange); }
  .badge-shift { background: #FEF3C7; color: #92400E; }
  .job-location { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
  .job-employment { font-size: 12px; color: var(--mid-gray); display: flex; align-items: center; gap: 5px; }

  .apply-btn { display: inline-flex; align-items: center; gap: 6px; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 16px; padding: 14px 32px; border-radius: var(--radius-sm); background: var(--biggby-orange); color: var(--white); text-decoration: none; border: none; cursor: pointer; transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1); white-space: nowrap; flex-shrink: 0; }
  .apply-btn:hover { background: var(--biggby-orange-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(250,100,30,0.25); }
  .apply-btn svg { transition: transform 0.2s; }
  .apply-btn:hover svg { transform: translateX(2px); }

  .footer { background: var(--biggby-black); padding: 32px 28px; text-align: center; margin-top: 32px; }
  .footer p { font-size: 12px; color: var(--mid-gray); line-height: 1.7; }
  .footer a { color: var(--biggby-orange); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  .fade-in { animation: fadeIn 0.3s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    .header-inner { padding: 12px 16px; }
    .header-logo-biggby { height: 34px; }
    .header-logo-abm { height: 30px; }
    .header-tag { display: none; }
    .portal { padding: 28px 12px 60px; }
    .hero-text h1 { font-size: 28px; }
    .hero-text p { font-size: 14px; }
    .options-grid.two-col { grid-template-columns: 1fr; }
    .options-grid.multi-col { grid-template-columns: 1fr; }
    .step-content { padding: 24px 16px; }
    .job-item { flex-direction: column; align-items: flex-start; }
    .apply-btn { width: 100%; justify-content: center; }
  }
</style>

let currentState = null;
let currentCity = null;

function getStates() { return [...new Set(jobs.map(j => j.state))].sort(); }
function getCitiesForState(s) { return [...new Set(jobs.filter(j => j.state === s).map(j => j.city))].sort(); }
function getJobsForCity(s, c) {
  const f = jobs.filter(j => j.state === s && j.city === c);
  const o = { store_leader: 0, shift_leader: 1, barista: 2 };
  f.sort((a, b) => o[a.type] - o[b.type]);
  return f;
}
function countForState(s) { return jobs.filter(j => j.state === s).length; }
function countForCity(s, c) { return jobs.filter(j => j.state === s && j.city === c).length; }

const pin = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B6660" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
const clock = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9E9A95" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
const arrow = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
const chev = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';

function renderStateStep() {
  currentState = null; currentCity = null;
  document.getElementById('breadcrumb').style.display = 'none';
  const states = getStates();
  let h = '<div class="step-title">Where are you looking to work?</div><div class="options-grid two-col">';
  states.forEach(s => {
    h += `<button class="option-btn state-btn" onclick="selectState('${s}')"><span>${s}</span><span style="display:flex;align-items:center;gap:8px;"><span class="count">${countForState(s)} positions</span><span class="arrow">${chev}</span></span></button>`;
  });
  h += '</div>';
  document.getElementById('stepContent').innerHTML = h;
}

function renderCityStep(state) {
  currentState = state; currentCity = null;
  const bc = document.getElementById('breadcrumb');
  bc.style.display = 'flex';
  bc.innerHTML = `<span class="breadcrumb-item" onclick="renderStateStep()">All States</span><span class="breadcrumb-sep">${chev}</span><span class="breadcrumb-current">${state}</span>`;
  const cities = getCitiesForState(state);
  let h = `<div class="step-title">Select a city in ${state}</div><div class="options-grid multi-col">`;
  cities.forEach(c => {
    h += `<button class="option-btn" onclick="selectCity('${c}')"><span>${c}</span><span style="display:flex;align-items:center;gap:8px;"><span class="count">${countForCity(state, c)}</span><span class="arrow">${chev}</span></span></button>`;
  });
  h += '</div>';
  document.getElementById('stepContent').innerHTML = h;
}

function renderJobsStep(state, city) {
  currentCity = city;
  const bc = document.getElementById('breadcrumb');
  bc.style.display = 'flex';
  bc.innerHTML = `<span class="breadcrumb-item" onclick="renderStateStep()">All States</span><span class="breadcrumb-sep">${chev}</span><span class="breadcrumb-item" onclick="renderCityStep('${state}')">${state}</span><span class="breadcrumb-sep">${chev}</span><span class="breadcrumb-current">${city}</span>`;
  const cj = getJobsForCity(state, city);
  let h = `<div class="step-title">${cj.length} open position${cj.length !== 1 ? 's' : ''} in ${city}</div><div class="job-list">`;
  cj.forEach(job => {
    const bc2 = job.type === 'store_leader' ? 'badge-leader' : job.type === 'shift_leader' ? 'badge-shift' : 'badge-barista';
    const bl = job.type === 'store_leader' ? 'Leadership' : job.type === 'shift_leader' ? 'Shift Leader' : 'Barista';
    h += `<div class="job-item fade-in"><div class="job-info"><div class="job-title-row"><span class="job-title">${job.title}</span><span class="job-badge ${bc2}">${bl}</span></div><div class="job-location">${pin} ${job.address}</div><div class="job-employment">${clock} ${job.employment}</div></div><a href="${job.url}" target="_blank" rel="noopener" class="apply-btn">Apply Now ${arrow}</a></div>`;
  });
  h += '</div>';
  document.getElementById('stepContent').innerHTML = h;
}

function selectState(s) { renderCityStep(s); document.getElementById('flowContainer').scrollIntoView({ behavior: 'smooth', block: 'start' }); }
function selectCity(c) { renderJobsStep(currentState, c); }

renderStateStep();
